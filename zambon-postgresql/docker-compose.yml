services:
  postgresql:
    image: postgres:17-alpine
    container_name: postgresql
    hostname: postgresql
    user: "0:0"
    restart: unless-stopped
    networks:
      - postgresql
    ports:
      - "5432:5432"
    volumes:
      - /home/umbrel/umbrel/home/Apps/zambon-postgresql:/var/lib/postgresql/data:rw
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres2025!
      POSTGRES_DB: postgres
      TZ: America/Sao_Paulo

networks:
  postgresql:
    name: postgresql
    driver: bridge
