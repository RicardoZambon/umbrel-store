services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    hostname: mysql
    user: "0:0"
    restart: unless-stopped
    networks:
      - mysql
    ports:
      - "3306:3306"
    volumes:
      - /home/umbrel/umbrel/home/Apps/zambon-mysql:/var/lib/mysql:rw
    environment:
      MYSQL_ROOT_PASSWORD: MySQL2025!
      MYSQL_DATABASE: mysql
      TZ: America/Sao_Paulo

networks:
  mysql:
    name: mysql
    driver: bridge
