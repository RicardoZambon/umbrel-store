manifestVersion: 1
id: zambon-redis
name: Redis
tagline: In-memory data store for caching and real-time applications
icon: https://img.icons8.com/color/480/redis.png
category: Development
version: "7"
port: 6379
description: >-
  Redis is an open-source, in-memory data structure store used as a database, cache,
  message broker, and streaming engine. Run it directly on your Umbrel server
  for blazing-fast key-value storage, pub/sub messaging, and session management.


  Connects on port 6379 with the default credentials configured in the container.
  Use any Redis client (RedisInsight, redis-cli, Another Redis Desktop Manager) to connect and manage your data.

developer: Redis Ltd.
website: https://redis.io
submitter: Ricardo Zambon
submission: https://github.com/RicardoZambon
repo: https://github.com/docker-library/redis
support: https://github.com/docker-library/redis/issues
gallery:
  - https://i.imgur.com/yyVG0Jb.jpeg
releaseNotes: >-
  Initial release of Redis 7 for UmbrelOS.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: "Redis2025!"
