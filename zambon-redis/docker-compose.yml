services:
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    user: "0:0"
    restart: unless-stopped
    networks:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - /home/umbrel/umbrel/home/Apps/zambon-redis:/data:rw
    environment:
      TZ: America/Sao_Paulo
    command: redis-server --requirepass Redis2025! --appendonly yes

networks:
  redis:
    name: redis
    driver: bridge
