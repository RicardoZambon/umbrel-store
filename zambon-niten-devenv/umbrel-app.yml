name: Niten Dev Environment
tagline: Browser-based VS Code with Angular and .NET pre-configured
icon: https://img.icons8.com/fluency/480/visual-studio-code-2019.png
category: Development
version: "1.0.0"
port: 8443
description: >-
  Remote development environment for the Niten System project, powered by code-server (VS Code in the browser).
  Comes pre-installed with Node.js 22, Angular CLI, .NET SDK 9.0, and essential VS Code extensions.


  Access a full development environment from any device's browser without using your own computer's resources.


  After first launch, clone your repos into the workspace and run the setup script to configure
  dotnet user-secrets and install npm dependencies.

