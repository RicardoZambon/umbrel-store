manifestVersion: 1
id: zambon-n8n
name: n8n
tagline: Workflow automation tool for connecting apps and services
icon: https://avatars.githubusercontent.com/u/45487711
category: Automation
version: "1.0.7"
port: 5678
description: >-
  n8n is a free and source-available workflow automation tool. It allows you
  to connect anything to everything via its fair-code model. With over 400
  integrations, you can automate tasks across your apps and services with a
  visual, node-based editor.


  Self-host n8n on your Umbrel server for full control over your data and
  workflows. Access the web interface on port 5678 to start building
  automations.

developer: n8n GmbH
website: https://n8n.io
submitter: Ricardo Zambon
submission: https://github.com/RicardoZambon
repo: https://github.com/n8n-io/n8n
support: https://github.com/n8n-io/n8n/issues
gallery:
  - https://i.imgur.com/ZkCWbV2.png
releaseNotes: >-
  Move n8n data and .env to the Umbrel home storage at Apps/n8n (visible in
  the Files app) using the UMBREL_ROOT variable. Data now survives app
  uninstall/reinstall, not just updates. IMPORTANT: before updating, copy
  the contents of app-data/zambon-n8n/data into home/Apps/n8n, otherwise
  n8n starts with a fresh database.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
