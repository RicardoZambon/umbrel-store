services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    hostname: n8n
    user: "0:0"
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ${APP_DATA_DIR}/data:/root/.n8n:rw
    env_file:
      - path: /home/umbrel/umbrel/home/Apps/zambon-n8n/.env
        required: false
      - path: ${APP_DATA_DIR}/.env
        required: false
    environment:
      TZ: America/Sao_Paulo
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_SECURE_COOKIE: "false"
