services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    hostname: pgadmin
    user: "0:0"
    restart: unless-stopped
    networks:
      - postgresql
    ports:
      - "5050:80"
    volumes:
      - /home/umbrel/umbrel/home/Apps/zambon-pgadmin:/var/lib/pgadmin:rw
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@umbrel.com
      PGADMIN_DEFAULT_PASSWORD: PgAdmin2025!
      PGADMIN_LISTEN_PORT: 80
      TZ: America/Sao_Paulo

networks:
  postgresql:
    name: postgresql
    external: true
